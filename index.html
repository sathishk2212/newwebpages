<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tezo — Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d12;
      --surface:   #15151e;
      --border:    #2a2a3a;
      --accent:    #e8194b;
      --accent2:   #ff6b35;
      --text:      #f0f0f5;
      --muted:     #7a7a9a;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Ambient glow behind the card */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(232,25,75,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* Logo mark — SVG-style circle made of CSS */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      list-style: none;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem 1.25rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .nav-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,25,75,0.07), rgba(255,107,53,0.04));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .nav-btn:hover::after { opacity: 1; }
    .nav-btn:active { transform: translateY(0); }

    .btn-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
    }

    .btn-icon.red   { background: rgba(232,25,75,0.15); color: var(--accent); }
    .btn-icon.orange { background: rgba(255,107,53,0.15); color: var(--accent2); }
    .btn-icon.purple { background: rgba(120,80,255,0.15); color: #9f70ff; }

    .btn-meta {
      text-align: left;
      flex: 1;
    }
    .btn-meta strong {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
    }
    .btn-meta span {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .btn-arrow {
      color: var(--muted);
      font-size: 1rem;
      transition: color 0.2s, transform 0.2s;
    }
    .nav-btn:hover .btn-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--border);
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-wrap">
      <img src="logow.png" alt="Tezo" style="height: 48px; width: auto;" />
    </div>

    <ul class="nav-list">
      <li>
        <a class="nav-btn" href="tezo-machinery-landing.html">
          <div class="btn-icon red">⚙️</div>
          <div class="btn-meta">
            <strong>Machinery Landing</strong>
          </div>
          <span class="btn-arrow">→</span>
        </a>
      </li>
      <li>
        <a class="nav-btn" href="tezo-qe-landing.html">
          <div class="btn-icon purple">🔬</div>
          <div class="btn-meta">
            <strong>QE Landing</strong>
          </div>
          <span class="btn-arrow">→</span>
        </a>
      </li>
       <li>
        <a class="nav-btn" href="assesment.html">
          <div class="btn-icon orange">📋</div>
          <div class="btn-meta">
            <strong>Assessment</strong>
          </div>
          <span class="btn-arrow">→</span>
        </a>
      </li>
    </ul>

  </div>

</body>
</html>
